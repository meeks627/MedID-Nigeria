services:
  - type: web
    name: medid
    runtime: node
    repo: https://github.com/meeks627/MedID-Nigeria
    buildCommand: npm run build
    startCommand: node dist/server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_URL
        value: https://medid.onrender.com
